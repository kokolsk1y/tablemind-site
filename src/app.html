<!doctype html>
<html lang="ru" data-theme="tablemind-light">

		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#F2EADA" />
		<meta name="description" content="TableMind — умное меню для ресторана: QR на столе или планшет у кассы. 12 языков, AI-чат с гостем, рост среднего чека 15–20 %. От 1 990 ₽/мес, 14 дней бесплатно." />

		<meta property="og:image:alt" content="TableMind — умное меню для ресторана" />
		<meta property="og:locale" content="ru_RU" />
		<meta property="og:site_name" content="TableMind" />

		%sveltekit.head%

	<body data-sveltekit-preload-data="hover">
