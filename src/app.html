<!doctype html>
<html lang="ru" data-theme="tablemind-light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#F2EADA" />
		<meta name="description" content="TableMind — AI-официант в PWA, открывается по QR со стола. Знает ваше меню, не врёт, зовёт живого официанта когда нужно." />
		<link rel="icon" type="image/png" href="/logo.png" />
		<link rel="apple-touch-icon" href="/logo.png" />

		<!-- Open Graph (Telegram, WhatsApp, FB) -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="TableMind — AI-официант, который знает ваше меню" />
		<meta property="og:description" content="Гость сканирует QR со стола — и получает собеседника, который рассказывает о блюдах, отвечает про аллергены и зовёт официанта в Telegram. Первые 3 ресторана — пилот бесплатно." />
		<meta property="og:image" content="https://tablemind.ru/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="TableMind — AI-официант для ресторанов" />
		<meta property="og:locale" content="ru_RU" />
		<meta property="og:site_name" content="TableMind" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="TableMind — AI-официант, который знает ваше меню" />
		<meta name="twitter:description" content="Пилот бесплатно для первых 3 ресторанов Калининграда." />
		<meta name="twitter:image" content="https://tablemind.ru/og-image.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
